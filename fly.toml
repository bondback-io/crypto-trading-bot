# fly.toml app configuration file generated for crypto-trading-bot on 2026-07-22T14:19:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crypto-trading-bot'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '8080'
  TRADING_MODE = 'paper'

[[mounts]]
  source = 'bot_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '45s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
